name: 🔒 Security & Dependency Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/package*.json'
      - 'backend/requirements.txt'

jobs:
  # 🔍 Frontend Security Scan
  frontend-security:
    name: 🎨 Frontend Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔒 NPM Audit
        working-directory: ./frontend
        run: |
          echo "🔒 Running npm audit..."
          npm audit --audit-level=moderate --json > audit-results.json || true
          
          # Parse and display results
          if [ -f audit-results.json ]; then
            vulnerabilities=$(cat audit-results.json | grep -o '"vulnerabilities":[0-9]*' | cut -d':' -f2)
            echo "Found $vulnerabilities vulnerabilities"
            
            if [ "$vulnerabilities" -gt 0 ]; then
              echo "⚠️ Security vulnerabilities found!"
              npm audit --audit-level=moderate
            else
              echo "✅ No security vulnerabilities found"
            fi
          fi

      - name: 🛡️ Snyk Security Test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --json-file-output=snyk-frontend.json
          command: test
        continue-on-error: true

      - name: 📊 Upload Security Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: frontend-security-results
          path: |
            frontend/audit-results.json
            snyk-frontend.json

  # 🔍 Backend Security Scan  
  backend-security:
    name: 🐍 Backend Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📥 Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety pip-audit

      - name: 🔒 Bandit Security Scan
        working-directory: ./backend
        run: |
          echo "🔒 Running Bandit security scan..."
          bandit -r app/ -f json -o bandit-results.json || true
          bandit -r app/ -f txt

      - name: 🛡️ Safety Dependency Check
        working-directory: ./backend
        run: |
          echo "🛡️ Running Safety dependency check..."
          safety check --json --output safety-results.json || true
          safety check

      - name: 📊 Pip-Audit Check
        working-directory: ./backend
        run: |
          echo "📊 Running pip-audit..."
          pip-audit --format=json --output=pip-audit-results.json || true
          pip-audit --format=text

      - name: 📊 Upload Security Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-security-results
          path: |
            backend/bandit-results.json
            backend/safety-results.json
            backend/pip-audit-results.json

  # 📋 Security Summary
  security-summary:
    name: 📋 Security Summary
    runs-on: ubuntu-latest
    needs: [frontend-security, backend-security]
    if: always()
    
    steps:
      - name: 📥 Download Security Results
        uses: actions/download-artifact@v3
        with:
          path: security-results

      - name: 📊 Generate Security Report
        run: |
          echo "🔒 **Security Audit Summary**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | NPM Audit | ${{ needs.frontend-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Snyk Scan | ${{ needs.frontend-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | Bandit | ${{ needs.backend-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | Safety | ${{ needs.backend-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | Pip-Audit | ${{ needs.backend-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for critical issues
          if [[ "${{ needs.frontend-security.result }}" == "failure" || "${{ needs.backend-security.result }}" == "failure" ]]; then
            echo "❌ **Critical security issues detected!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the security scan results and address any high-severity vulnerabilities." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No critical security issues detected**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Security scan artifacts have been uploaded for detailed review." >> $GITHUB_STEP_SUMMARY