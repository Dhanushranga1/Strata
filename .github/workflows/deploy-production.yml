name: 🚢 Production Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      deploy_frontend:
        description: 'Deploy Frontend to Vercel'
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: 'Deploy Backend to Railway'
        required: true
        default: true
        type: boolean
      run_migrations:
        description: 'Run Database Migrations'
        required: true
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # 🔍 Pre-deployment Validation
  pre-deployment-checks:
    name: 🔍 Pre-deployment Validation
    runs-on: ubuntu-latest
    
    outputs:
      should-deploy-frontend: ${{ steps.changes.outputs.frontend }}
      should-deploy-backend: ${{ steps.changes.outputs.backend }}
      deployment-id: ${{ steps.deployment.outputs.deployment_id }}
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Detect Changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD~1 HEAD | grep -q "^backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Create Deployment
        id: deployment
        uses: actions/github-script@v6
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ github.event.inputs.environment }}',
              description: 'TicketPilot deployment to ${{ github.event.inputs.environment }}',
              auto_merge: false
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: 📋 Deployment Summary
        run: |
          echo "🚀 **Deployment Plan for ${{ github.event.inputs.environment }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Deploy**: ${{ github.event.inputs.deploy_frontend }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Deploy**: ${{ github.event.inputs.deploy_backend }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Migrations**: ${{ github.event.inputs.run_migrations }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY

  # 🎨 Frontend Production Build & Deploy
  deploy-frontend:
    name: 🎨 Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: github.event.inputs.deploy_frontend == 'true'
    environment: 
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.vercel-deploy.outputs.preview-url }}
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: 🚀 Deploy to Vercel
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: ${{ github.event.inputs.environment == 'production' && '--prod' || '' }}

      - name: 💡 Post-deployment Lighthouse Check
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            ${{ steps.vercel-deploy.outputs.preview-url }}
          configPath: './frontend/.lighthouserc.json'
          uploadArtifacts: true

      - name: ✅ Deployment Success Notification
        if: success()
        run: |
          echo "🎉 **Frontend Deployment Successful!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.vercel-deploy.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY

  # 🐍 Backend Production Deploy
  deploy-backend:
    name: 🐍 Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: github.event.inputs.deploy_backend == 'true'
    environment: ${{ github.event.inputs.environment }}
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔍 Validate Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --dry-run
          echo "✅ All requirements are valid"

      - name: 🚂 Deploy to Railway
        uses: bervProject/railway-deploy@v1.2.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
          detach: true

      - name: ⏳ Wait for Railway Deployment
        run: |
          echo "⏳ Waiting for Railway deployment to complete..."
          sleep 60  # Wait for Railway to build and deploy

      - name: 🏥 Health Check
        run: |
          echo "🏥 Performing health check..."
          max_retries=10
          retry_count=0
          
          while [ $retry_count -lt $max_retries ]; do
            if curl -f -s "${{ secrets.RAILWAY_APP_URL }}/api/health" > /dev/null; then
              echo "✅ Backend health check passed!"
              break
            else
              echo "⏳ Health check failed, retrying in 30 seconds... ($((retry_count + 1))/$max_retries)"
              sleep 30
              retry_count=$((retry_count + 1))
            fi
          done
          
          if [ $retry_count -eq $max_retries ]; then
            echo "❌ Health check failed after $max_retries attempts"
            exit 1
          fi

      - name: ✅ Backend Deployment Success
        if: success()
        run: |
          echo "🎉 **Backend Deployment Successful!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ secrets.RAILWAY_APP_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY

  # 🗃️ Database Migration
  run-migrations:
    name: 🗃️ Database Migrations
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-backend]
    if: github.event.inputs.run_migrations == 'true' && (success() || needs.deploy-backend.result == 'skipped')
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📥 Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗃️ Run Database Migrations
        working-directory: ./backend
        run: |
          echo "🗃️ Running database migrations for ${{ github.event.inputs.environment }}..."
          python -c "
          import asyncio
          from app.database import get_database_connection
          
          async def run_migrations():
              conn = await get_database_connection()
              try:
                  # Add your migration logic here
                  result = await conn.fetchval('SELECT 1')
                  print(f'✅ Database connection successful: {result}')
              finally:
                  await conn.close()
          
          asyncio.run(run_migrations())
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: ✅ Migration Success
        run: |
          echo "🎉 **Database Migration Successful!**" >> $GITHUB_STEP_SUMMARY

  # 🧪 Post-deployment Testing
  post-deployment-tests:
    name: 🧪 Post-deployment Tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-backend.result == 'success')
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📥 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest

      - name: 🧪 Run Smoke Tests
        run: |
          echo "🧪 Running smoke tests against deployed services..."
          
          # Test backend health
          if curl -f -s "${{ secrets.RAILWAY_APP_URL }}/api/health" > /dev/null; then
            echo "✅ Backend health check passed"
          else
            echo "❌ Backend health check failed"
            exit 1
          fi
          
          # Test frontend availability
          if curl -f -s "${{ needs.deploy-frontend.outputs.preview-url || secrets.VERCEL_APP_URL }}" > /dev/null; then
            echo "✅ Frontend availability check passed"
          else
            echo "❌ Frontend availability check failed"
            exit 1
          fi

      - name: 📊 Performance Benchmark
        run: |
          echo "📊 Running performance benchmarks..."
          
          # Simple response time test
          response_time=$(curl -o /dev/null -s -w '%{time_total}' "${{ secrets.RAILWAY_APP_URL }}/api/health")
          echo "Backend response time: ${response_time}s"
          
          if (( $(echo "$response_time < 2.0" | bc -l) )); then
            echo "✅ Backend performance acceptable (< 2s)"
          else
            echo "⚠️ Backend performance degraded (> 2s)"
          fi

  # 📊 Deployment Status Update
  deployment-status:
    name: 📊 Update Deployment Status
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, deploy-frontend, deploy-backend, post-deployment-tests]
    if: always()
    
    steps:
      - name: 🎯 Determine Deployment Status
        id: status
        run: |
          frontend_result="${{ needs.deploy-frontend.result }}"
          backend_result="${{ needs.deploy-backend.result }}"
          tests_result="${{ needs.post-deployment-tests.result }}"
          
          if [[ "$frontend_result" == "success" && "$backend_result" == "success" && "$tests_result" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "description=All services deployed successfully" >> $GITHUB_OUTPUT
          elif [[ "$frontend_result" == "failure" || "$backend_result" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "description=Deployment failed" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "description=Deployment completed with warnings" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Update Deployment Status
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: '${{ needs.pre-deployment-checks.outputs.deployment-id }}',
              state: '${{ steps.status.outputs.status }}',
              description: '${{ steps.status.outputs.description }}',
              environment: '${{ github.event.inputs.environment }}'
            });

      - name: 📋 Final Deployment Report
        run: |
          echo "🚀 **Deployment Complete - ${{ github.event.inputs.environment }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ github.event.inputs.deploy_frontend }} | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ github.event.inputs.deploy_backend }} | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | - | ${{ needs.post-deployment-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ steps.status.outputs.status }} 🎯" >> $GITHUB_STEP_SUMMARY